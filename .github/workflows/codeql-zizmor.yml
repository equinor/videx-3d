name: GitHub Actions Security Analysis with zizmor 🌈

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions: {}

jobs:
  zizmor:
    name: Run zizmor
    uses: equinor/ops-actions/.github/workflows/zizmor-codeql.yml@bd92a1ff6b435a04480a0b72d29672fc422528f4 # v9.39.0
    with:
      config_file: .github/zizmor.yml
    permissions:
      security-events: write
      contents: read
      actions: read
