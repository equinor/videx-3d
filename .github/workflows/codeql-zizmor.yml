name: GitHub Actions Security Analysis with zizmor 🌈

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions: {}

jobs:
  zizmor:
    name: Run zizmor
    uses: equinor/ops-actions/.github/workflows/zizmor-codeql.yml@8c9c3b94821100c8101be18193ad8136c24c6167 # v9.38.3
    with:
      config_file: .github/zizmor.yml
    permissions:
      security-events: write
      contents: read
      actions: read
