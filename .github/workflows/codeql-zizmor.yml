name: GitHub Actions Security Analysis with zizmor 🌈

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions: {}

jobs:
  zizmor:
    name: Run zizmor
    uses: equinor/ops-actions/.github/workflows/zizmor-codeql.yml@c1be86e02c64b0d2db5c2dba532b5580cdce168d # v9.38.0
    with:
      config_file: .github/zizmor.yml
    permissions:
      security-events: write
      contents: read
      actions: read
