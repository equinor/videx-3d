name: GitHub Actions Security Analysis with zizmor 🌈

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions: {}

jobs:
  zizmor:
    name: Run zizmor
    uses: equinor/ops-actions/.github/workflows/zizmor-codeql.yml@e5aa8af4951a0bee6403409c065bb310296bdef6 # v9.37.0
    with:
      config_file: .github/zizmor.yml
    permissions:
      security-events: write
      contents: read
      actions: read
