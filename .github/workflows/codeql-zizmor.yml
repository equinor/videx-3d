name: GitHub Actions Security Analysis with zizmor 🌈

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions: {}

jobs:
  zizmor:
    name: Run zizmor
    uses: equinor/ops-actions/.github/workflows/zizmor-codeql.yml@e8dfd5776985e7d74c93787841b1a1b830d80175 # v9.39.1
    with:
      config_file: .github/zizmor.yml
    permissions:
      security-events: write
      contents: read
      actions: read
